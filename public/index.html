<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Screen Stream</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0d0f12;
        color: #e6e8eb;
        display: flex;
        height: 100vh;
        overflow: hidden;
      }

      /* ── Sidebar ── */
      aside {
        width: 230px;
        flex-shrink: 0;
        background: #13161b;
        border-right: 1px solid #1e2229;
        display: flex;
        flex-direction: column;
      }
      .sidebar-top {
        padding: 18px 16px 12px;
        border-bottom: 1px solid #1e2229;
      }
      .sidebar-top .logo {
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #e6e8eb;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .sidebar-top .logo-dot {
        width: 8px; height: 8px;
        border-radius: 50%;
        background: #2f6fed;
      }
      .sidebar-section-label {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #4b5563;
        padding: 14px 16px 6px;
      }
      .device-list { flex: 1; overflow-y: auto; padding: 0 8px 8px; }
      .device-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 10px;
        border-radius: 7px;
        cursor: pointer;
        transition: background 0.12s;
        margin-bottom: 1px;
      }
      .device-item:hover { background: #1a1e25; }
      .device-item.active { background: #162035; }
      .device-item.active .device-name { color: #60a5fa; }
      .live-dot {
        width: 7px; height: 7px;
        border-radius: 50%;
        background: #22c55e;
        box-shadow: 0 0 5px #22c55e99;
        flex-shrink: 0;
      }
      .device-info { flex: 1; min-width: 0; }
      .device-name {
        font-size: 13px;
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .device-meta {
        font-size: 11px;
        color: #6b7280;
        margin-top: 1px;
      }
      .no-devices {
        padding: 24px 16px;
        font-size: 12px;
        color: #4b5563;
        text-align: center;
        line-height: 1.6;
      }
      .sidebar-footer {
        padding: 10px 14px;
        border-top: 1px solid #1e2229;
        font-size: 11px;
        color: #4b5563;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .conn-dot {
        width: 6px; height: 6px;
        border-radius: 50%;
        background: #4b5563;
        flex-shrink: 0;
      }
      .conn-dot.ok { background: #22c55e; }

      /* ── Main ── */
      main {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        min-width: 0;
      }
      .topbar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 11px 18px;
        background: #13161b;
        border-bottom: 1px solid #1e2229;
        flex-shrink: 0;
      }
      .topbar-title {
        font-size: 14px;
        font-weight: 600;
        flex: 1;
        min-width: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .badge {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.07em;
        padding: 3px 8px;
        border-radius: 5px;
        display: none;
      }
      .badge.live { background: #166534; color: #4ade80; display: inline; }
      .badge.waiting { background: #1e2229; color: #9ca3af; display: inline; }
      .back-btn {
        font-size: 12px;
        color: #6b7280;
        cursor: pointer;
        padding: 4px 8px;
        border-radius: 5px;
        transition: background 0.12s, color 0.12s;
        display: none;
      }
      .back-btn:hover { background: #1e2229; color: #e6e8eb; }
      .back-btn.show { display: inline; }

      .content {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        padding: 16px;
        position: relative;
      }

      /* Stream */
      #stream-img {
        max-width: 100%;
        max-height: 100%;
        border-radius: 8px;
        border: 1px solid #1e2229;
        display: none;
        position: absolute;
        top: 16px; left: 16px; right: 16px; bottom: 16px;
        width: calc(100% - 32px);
        height: calc(100% - 32px);
        object-fit: contain;
      }
      .overlay-msg {
        font-size: 13px;
        color: #6b7280;
        text-align: center;
        display: none;
      }

      /* Home */
      #home {
        width: 100%;
        max-width: 720px;
        text-align: center;
      }
      .home-title {
        font-size: 32px;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin-bottom: 6px;
      }
      .home-sub {
        font-size: 14px;
        color: #6b7280;
        margin-bottom: 36px;
      }
      .device-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        justify-content: center;
      }
      .device-card {
        background: #13161b;
        border: 1px solid #1e2229;
        border-radius: 12px;
        padding: 18px 22px;
        cursor: pointer;
        transition: border-color 0.15s, background 0.15s, transform 0.1s;
        min-width: 160px;
        text-align: left;
      }
      .device-card:hover {
        border-color: #2f6fed;
        background: #162035;
        transform: translateY(-1px);
      }
      .card-indicator {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 12px;
      }
      .card-dot {
        width: 8px; height: 8px;
        border-radius: 50%;
        background: #22c55e;
        box-shadow: 0 0 6px #22c55e88;
      }
      .card-live {
        font-size: 10px;
        font-weight: 700;
        color: #4ade80;
        letter-spacing: 0.06em;
      }
      .card-name {
        font-size: 15px;
        font-weight: 600;
        margin-bottom: 3px;
      }
      .card-meta { font-size: 12px; color: #6b7280; }

      .empty-home {
        color: #4b5563;
        font-size: 14px;
        line-height: 1.8;
      }
      .empty-home code {
        font-size: 12px;
        background: #1e2229;
        padding: 2px 6px;
        border-radius: 4px;
        color: #9ca3af;
      }
    </style>
  </head>
  <body>
    <aside>
      <div class="sidebar-top">
        <div class="logo">
          <div class="logo-dot"></div>
          Screen Stream
        </div>
      </div>
      <div class="sidebar-section-label">Devices</div>
      <div class="device-list" id="device-list">
        <div class="no-devices" id="no-devices">
          No devices online.<br>Run <code>agent.py</code> on a machine to see it here.
        </div>
      </div>
      <div class="sidebar-footer">
        <div class="conn-dot" id="conn-dot"></div>
        <span id="conn-label">Connecting…</span>
      </div>
    </aside>

    <main>
      <div class="topbar">
        <span class="back-btn" id="back-btn" onclick="showHome()">&#8592; Home</span>
        <div class="topbar-title" id="topbar-title">Screen Stream</div>
        <span class="badge" id="badge"></span>
      </div>
      <div class="content" id="content">
        <div id="home">
          <div class="home-title">Screen Stream</div>
          <div class="home-sub" id="home-sub">Waiting for devices to connect…</div>
          <div class="device-grid" id="device-grid">
            <div class="empty-home">
              Start <code>agent.py</code> on any machine<br>and it will appear here automatically.
            </div>
          </div>
        </div>
        <img id="stream-img" alt="remote screen" />
        <div class="overlay-msg" id="overlay-msg"></div>
      </div>
    </main>

    <script>
      const $deviceList  = document.getElementById("device-list");
      const $noDevices   = document.getElementById("no-devices");
      const $deviceGrid  = document.getElementById("device-grid");
      const $homeSub     = document.getElementById("home-sub");
      const $home        = document.getElementById("home");
      const $streamImg   = document.getElementById("stream-img");
      const $overlayMsg  = document.getElementById("overlay-msg");
      const $topbarTitle = document.getElementById("topbar-title");
      const $badge       = document.getElementById("badge");
      const $backBtn     = document.getElementById("back-btn");
      const $connDot     = document.getElementById("conn-dot");
      const $connLabel   = document.getElementById("conn-label");

      let ws = null;
      let devices = {};
      let watchingId = null;
      let currentUrl = null;

      function timeAgo(ts) {
        const s = Math.floor((Date.now() - ts) / 1000);
        if (s < 60) return `${s}s`;
        if (s < 3600) return `${Math.floor(s / 60)}m`;
        return `${Math.floor(s / 3600)}h`;
      }

      function setBadge(state) {
        $badge.className = "badge";
        if (state === "live") {
          $badge.classList.add("live");
          $badge.textContent = "LIVE";
        } else if (state === "waiting") {
          $badge.classList.add("waiting");
          $badge.textContent = "Waiting…";
        }
      }

      function renderSidebar() {
        const ids = Object.keys(devices);
        $noDevices.style.display = ids.length ? "none" : "block";

        const existing = new Set([...$deviceList.querySelectorAll(".device-item")].map(el => el.dataset.id));
        for (const id of existing) {
          if (!devices[id]) $deviceList.querySelector(`[data-id="${id}"]`).remove();
        }
        for (const id of ids) {
          const d = devices[id];
          let el = $deviceList.querySelector(`[data-id="${id}"]`);
          if (!el) {
            el = document.createElement("div");
            el.className = "device-item";
            el.dataset.id = id;
            el.innerHTML = `<div class="live-dot"></div><div class="device-info"><div class="device-name"></div><div class="device-meta"></div></div>`;
            el.addEventListener("click", () => watchDevice(id));
            $deviceList.appendChild(el);
          }
          el.querySelector(".device-name").textContent = d.name;
          el.querySelector(".device-meta").textContent = `Live · ${timeAgo(d.connectedAt)} ago`;
          el.classList.toggle("active", id === watchingId);
        }
      }

      function renderHome() {
        const ids = Object.keys(devices);
        if (ids.length === 0) {
          $homeSub.textContent = "Waiting for devices to connect…";
          $deviceGrid.innerHTML = `<div class="empty-home">Start <code>agent.py</code> on any machine<br>and it will appear here automatically.</div>`;
        } else {
          $homeSub.textContent = `${ids.length} device${ids.length > 1 ? "s" : ""} online — click one to view`;
          $deviceGrid.innerHTML = ids.map(id => {
            const d = devices[id];
            return `<div class="device-card" onclick="watchDevice('${id}')">
              <div class="card-indicator"><div class="card-dot"></div><span class="card-live">LIVE</span></div>
              <div class="card-name">${escHtml(d.name)}</div>
              <div class="card-meta">Connected ${timeAgo(d.connectedAt)} ago</div>
            </div>`;
          }).join("");
        }
      }

      function escHtml(s) {
        return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
      }

      function showHome() {
        watchingId = null;
        $home.style.display = "block";
        $streamImg.style.display = "none";
        $overlayMsg.style.display = "none";
        $topbarTitle.textContent = "Screen Stream";
        $badge.className = "badge";
        $backBtn.classList.remove("show");
        renderSidebar();
        renderHome();
      }

      function watchDevice(id) {
        if (!devices[id]) return;
        watchingId = id;
        $home.style.display = "none";
        $streamImg.style.display = "none";
        $overlayMsg.style.display = "block";
        $overlayMsg.textContent = "Waiting for first frame…";
        $topbarTitle.textContent = devices[id].name;
        $backBtn.classList.add("show");
        setBadge("waiting");
        renderSidebar();
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: "watch", id }));
        }
      }

      function connect() {
        const proto = location.protocol === "https:" ? "wss" : "ws";
        ws = new WebSocket(`${proto}://${location.host}/?role=viewer`);
        ws.binaryType = "blob";

        ws.onopen = () => {
          $connDot.classList.add("ok");
          $connLabel.textContent = "Connected";
          if (watchingId && devices[watchingId]) {
            ws.send(JSON.stringify({ type: "watch", id: watchingId }));
          }
        };

        ws.onmessage = (event) => {
          if (typeof event.data === "string") {
            try {
              const m = JSON.parse(event.data);
              if (m.type === "agents") {
                devices = {};
                for (const a of m.list) devices[a.id] = a;
                const count = m.list.length;
                $connLabel.textContent = `${count} device${count !== 1 ? "s" : ""} online`;
                if (watchingId && !devices[watchingId]) showHome();
                else { renderSidebar(); if (!watchingId) renderHome(); }
              } else if (m.type === "agent_offline") {
                delete devices[m.id];
                if (watchingId === m.id) {
                  $overlayMsg.style.display = "block";
                  $overlayMsg.textContent = "Device disconnected.";
                  $streamImg.style.display = "none";
                  setBadge("waiting");
                }
                renderSidebar();
                if (!watchingId) renderHome();
                const count = Object.keys(devices).length;
                $connLabel.textContent = `${count} device${count !== 1 ? "s" : ""} online`;
              }
            } catch (_) {}
            return;
          }
          if (watchingId) {
            const next = URL.createObjectURL(event.data);
            $streamImg.onload = () => {
              if (currentUrl) URL.revokeObjectURL(currentUrl);
              currentUrl = next;
            };
            $streamImg.src = next;
            $streamImg.style.display = "block";
            $overlayMsg.style.display = "none";
            setBadge("live");
          }
        };

        ws.onclose = () => {
          $connDot.classList.remove("ok");
          $connLabel.textContent = "Reconnecting…";
          $badge.className = "badge";
          setTimeout(connect, 3000);
        };

        ws.onerror = () => {
          $connLabel.textContent = "Connection error";
        };
      }

      setInterval(() => { renderSidebar(); if (!watchingId) renderHome(); }, 15000);

      showHome();
      connect();
    </script>
  </body>
</html>
